services:
  - type: web
    name: nextgen-campus-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: nextgen-campus-db
          property: connectionString

databases:
  - name: nextgen-campus-db
    databaseName: campus
    user: campus_user
